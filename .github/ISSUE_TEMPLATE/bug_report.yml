name: Bug 反馈
description: 报告一个可复现的问题，帮助维护者快速定位。
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 用 2-3 句话说明现象、影响范围和你原本期望的结果。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序列出命令、页面操作、输入参数或样例数据。
      placeholder: |
        1. 执行 `py -3.13 main.py ...`
        2. 打开 `/reports`
        3. 点击某个任务
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 粘贴报错、截图说明或日志摘要。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 说明你认为系统应该如何表现。
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 提供操作系统、Python、Node.js、数据库和浏览器版本。
      placeholder: |
        - OS:
        - Python:
        - Node.js:
        - PostgreSQL:
        - Browser:
    validations:
      required: true
